[build]
  publish = "."
  command = "echo 'Static site — no build needed'"

[build.environment]
  NETLIFY_EDGE_FUNCTIONS_ENABLED = "false"

[dev]
  framework = "#static"

[[redirects]]
  from = "/faq"
  to = "/faq.html"
  status = 200

[[redirects]]
  from = "/history"
  to = "/history.html"
  status = 200

[[redirects]]
  from = "/recipe-montana-mule"
  to = "/recipe-montana-mule.html"
  status = 200

[[redirects]]
  from = "/recipe-huckleberry-shine"
  to = "/recipe-huckleberry-shine.html"
  status = 200

[[redirects]]
  from = "/recipe-midnight-smoke"
  to = "/recipe-midnight-smoke.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/recipes"
  to = "/recipes.html"
  status = 200

[[redirects]]
  from = "/shop"
  to = "/shop.html"
  status = 200

[[redirects]]
  from = "/venue"
  to = "/venue.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/refund"
  to = "/refund.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/product"
  to = "/product.html"
  status = 200

[[redirects]]
  from = "/email-flows"
  to = "/email-flows.html"
  status = 200

[[redirects]]
  from = "/growth-plan"
  to = "/growth-plan.html"
  status = 200

[[redirects]]
  from = "/thank-you"
  to = "/thank-you.html"
  status = 200

[[redirects]]
  from = "/deliverables"
  to = "/deliverables.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

# Long-term asset caching
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/recipe-photos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/venue/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
